<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet"  type="text/css" href="assets/css/style.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <title>Adalene shop</title>
    </head>
    <body>
       <div id="header">
            <div id="logo">
                <a href="index.html">Adalene</a>
            </div>
            <div id="navigacija-korpa">
                <div id="navigacija">
                    <ul>
                        <li><a class="activ" href="index.html">Home</a></li>
                        <li><a href="shopAll.html">Shop All</a></li>
                        <li><a href="index.html#shop">Our Story</a></li>
                        <li><a href="author.html">Author</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div id="korpa">
                    <i class="bi bi-cart fs-2"></i>
                    <span id="cartCount">0</span>
                    <button id="clearCart">Obriši korpu</button>
                    <div id="cartItems"></div>
                    <div id="message"></div>
                </div>
            </div>
        </div>

        <div id="product-title">
            <h1>Katalog proizvoda</h1>
        </div>

    <!-- Gornji filter-bar -->
        <div class="filter-bar">
            <div class="filter-item">
                <input type="text" placeholder="Pretraži proizvode..." class="search-input">
            </div>
            <div class="filter-item">
                <select class="sortDropdown">
                    <option value="default">Izaberite</option>
                    <option value="price-asc">Cena: rastuće</option>
                    <option value="price-desc">Cena: opadajuće</option>
                    <option value="name-asc">Naziv: A-Z</option>
                    <option value="name-desc">Naziv: Z-A</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="fav-checkbox">
                    <input type="checkbox"> Samo omiljeni
                </label>
            </div>
        </div>

    <!-- Donji blok: filteri levo + proizvodi desno -->
        <div class="content-layout">
            <aside class="filters">
                <h3>Filtriraj</h3>

            
                <div class="filter-section categories">
                    <h4>Kategorije</h4>
                    
                </div>

            
                <div class="filter-section brands">
                    <h4>Brendovi</h4>
                
                </div>

                <!-- Cena -->
                <div class="filter-section">
                    <h4>Cena</h4>
                    <input type="range" min="50" max="500" value="250" class="price-range">
                    <p>Do: <span id="price-value">250</span> $</p>
                </div>
            </aside>

        <!-- Proizvodi -->
            <section class="products"></section>
        </div>

    
        
        <footer class="site-footer">
            <div class="footer-social">
                <a href="https://facebook.com" target="_blank"><i class="bi bi-facebook"></i></a>
                <a href="https://instagram.com" target="_blank"><i class="bi bi-instagram"></i></a>
                <a href="https://linkedin.com" target="_blank"><i class="bi bi-linkedin"></i></a>
                <a href="https://twitter.com" target="_blank"><i class="bi bi-twitter"></i></a>
            </div>

            <div class="footer-links">
                <a href="sitemap.xml">Sitemap</a>
                <a href="rss.xml">RSS</a>
                <a href="docs.html">Dokumentacija</a>
                <a href="style.min.css">Minifikovan CSS</a>
                <a href="script.min.js">Minifikovan JS</a>
            </div>

            <p class="footer-copy">&copy; 2026 Adalene. All rights reserved.</p>
        </footer>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
